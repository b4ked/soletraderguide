<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 232 44" width="232" height="44">
  <!-- Icon mark -->
  <rect x="0" y="2" width="40" height="40" rx="9" fill="#0d6e6e"/>
  <!-- Compass needle — north -->
